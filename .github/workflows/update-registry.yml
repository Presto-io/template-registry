name: Update Template Registry

on:
  schedule:
    - cron: '0 8 * * *'           # 每日 UTC 08:00
  repository_dispatch:
    types: [official-release-published]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: '强制重建所有模板'
        type: boolean
        default: false

permissions: {}

concurrency:
  group: update-template-registry-${{ github.event.client_payload.channel || 'production' }}
  cancel-in-progress: false

jobs:
  # ─── Job 1: extract（GitHub-hosted，低权限）────────────────────
  # 搜索模板仓库、官方模板下载二进制提取、community 模板从 repo 读取
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Discover templates
        env:
          GITHUB_TOKEN: ${{ github.token }}
          FORCE_REBUILD: ${{ inputs.force_rebuild && 'true' || github.event.client_payload.force_rebuild || 'false' }}
          OFFICIAL_TEMPLATE: ${{ github.event.client_payload.template || '' }}
          OFFICIAL_TAG: ${{ github.event.client_payload.tag || '' }}
          OFFICIAL_VERSION: ${{ github.event.client_payload.version || '' }}
          ALLOW_PRERELEASE_TEMPLATES: ${{ github.event.client_payload.allow_prerelease || 'false' }}
        run: python scripts/build_registry.py discover

      - name: Extract template data
        run: python scripts/build_registry.py extract

      - name: Upload extracted data
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: extracted-data
          path: output/
          retention-days: 1

  # ─── Job 2: compile-and-deploy（macOS ARM64 self-hosted）──────
  # SVG 编译（仅 official + verified）、生成索引、提交部署
  compile-and-deploy:
    needs: extract
    runs-on: [self-hosted, macOS, ARM64]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download extracted data
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: extracted-data
          path: output/

      - name: Download fonts
        run: python3 scripts/download_fonts.py

      - name: Compile SVGs
        run: |
          python3 scripts/build_registry.py compile \
            --font-path fonts/ \
            --font-path "$HOME/Library/Fonts" \
            --font-path /Library/Fonts

      - name: Generate registry index
        env:
          REGISTRY_BASE_PATH: ${{ github.event.client_payload.channel == 'prerelease' && 'templates-prerelease' || 'templates' }}
        run: python3 scripts/build_registry.py index

      - name: Commit registry updates
        env:
          CI_GPG_KEY_ID: ${{ vars.CI_GPG_KEY_ID }}
          CI_GPG_PASSPHRASE: ${{ secrets.CI_GPG_PASSPHRASE }}
          CI_GPG_PRIVATE_KEY: ${{ secrets.CI_GPG_PRIVATE_KEY }}
          CI_GIT_USER_EMAIL: ${{ vars.CI_GIT_USER_EMAIL }}
          CI_GIT_USER_NAME: ${{ vars.CI_GIT_USER_NAME }}
          REGISTRY_CHANNEL: ${{ github.event.client_payload.channel || 'production' }}
        run: |
          if [ "${REGISTRY_CHANNEL}" != "production" ]; then
            echo "Skipping template-registry commit for ${REGISTRY_CHANNEL} channel"
            exit 0
          fi

          git add templates/ registry.json
          git diff --cached --quiet && echo "No changes" && exit 0
          bash scripts/ci/setup-git-signing.sh
          git commit -m "chore: 更新模板注册表"
          target_branch="${GITHUB_REF_NAME:-main}"
          git pull --rebase origin "${target_branch}"
          git push origin "HEAD:${target_branch}"

      - name: Deploy to registry-deploy
        env:
          CI_GPG_KEY_ID: ${{ vars.CI_GPG_KEY_ID }}
          CI_GPG_PASSPHRASE: ${{ secrets.CI_GPG_PASSPHRASE }}
          CI_GPG_PRIVATE_KEY: ${{ secrets.CI_GPG_PRIVATE_KEY }}
          CI_GIT_USER_EMAIL: ${{ vars.CI_GIT_USER_EMAIL }}
          CI_GIT_USER_NAME: ${{ vars.CI_GIT_USER_NAME }}
          GH_TOKEN: ${{ secrets.PRESTO_PAT }}
          REGISTRY_CHANNEL: ${{ github.event.client_payload.channel || 'production' }}
        run: |
          test -f output/deploy/registry.json || { echo "No registry.json, skipping deploy"; exit 0; }
          has_dirs=$(find output/deploy -mindepth 1 -maxdepth 1 -type d | head -1)
          if [ -z "$has_dirs" ]; then
            echo "No template directories to deploy, skipping"
            exit 0
          fi

          case "${REGISTRY_CHANNEL}" in
            production)
              target_dir="templates"
              ;;
            prerelease)
              target_dir="templates-prerelease"
              ;;
            *)
              echo "Unsupported registry channel: ${REGISTRY_CHANNEL}" >&2
              exit 1
              ;;
          esac

          rm -rf /tmp/deploy
          git_auth_config=(
            -c credential.helper=
            -c "credential.https://github.com.helper=!f() { echo username=x-access-token; echo password=\$GH_TOKEN; }; f"
          )
          git "${git_auth_config[@]}" clone https://github.com/Presto-io/registry-deploy.git /tmp/deploy
          bash scripts/ci/setup-git-signing.sh /tmp/deploy
          mkdir -p "/tmp/deploy/${target_dir}"
          registry_source="output/deploy/registry.json"
          if [ "${REGISTRY_CHANNEL}" != "production" ] && [ -f "/tmp/deploy/${target_dir}/registry.json" ]; then
            python3 - "/tmp/deploy/${target_dir}/registry.json" "${registry_source}" /tmp/merged-registry.json output/deploy <<'PY'
          import json
          import sys
          from pathlib import Path

          old_path, new_path, out_path, deploy_dir = sys.argv[1:]
          updated = {
              path.name
              for path in Path(deploy_dir).iterdir()
              if path.is_dir()
          }

          with open(old_path, "r", encoding="utf-8") as f:
              old_registry = json.load(f)
          with open(new_path, "r", encoding="utf-8") as f:
              new_registry = json.load(f)

          old_by_name = {
              template.get("name"): template
              for template in old_registry.get("templates", [])
              if template.get("name")
          }
          merged = []
          seen = set()

          for template in new_registry.get("templates", []):
              name = template.get("name")
              if not name:
                  continue
              if name not in updated and name in old_by_name:
                  template = old_by_name[name]
              merged.append(template)
              seen.add(name)

          for name, template in old_by_name.items():
              if name not in seen:
                  merged.append(template)

          new_registry["templates"] = sorted(merged, key=lambda item: item.get("name", ""))
          with open(out_path, "w", encoding="utf-8") as f:
              json.dump(new_registry, f, ensure_ascii=False, indent=2)
              f.write("\n")
          PY
            registry_source="/tmp/merged-registry.json"
          fi
          cp "${registry_source}" "/tmp/deploy/${target_dir}/registry.json"
          find output/deploy -mindepth 1 -maxdepth 1 -type d | while read -r template_dir; do
            name="$(basename "${template_dir}")"
            rm -rf "/tmp/deploy/${target_dir}/${name}"
            cp -R "${template_dir}" "/tmp/deploy/${target_dir}/"
          done
          cd /tmp/deploy
          git add "${target_dir}/"
          if git diff --cached --quiet; then
            echo "No changes to registry"
            exit 0
          fi
          git commit -m "chore: update ${REGISTRY_CHANNEL} template registry"
          git "${git_auth_config[@]}" pull --rebase origin main
          git "${git_auth_config[@]}" push
